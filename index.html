<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nederlands">

<title>Hollandaca Flashcard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

:root {
–bg: #0a0a0a;
–surface: #141414;
–surface2: #1e1e1e;
–border: rgba(255,255,255,0.08);
–text: #f0ede8;
–muted: rgba(240,237,232,0.45);
–hint: rgba(240,237,232,0.25);
–green: #3ecf8e;
–green-dim: rgba(62,207,142,0.12);
–red: #ff6b6b;
–red-dim: rgba(255,107,107,0.12);
–gold: #f5c842;
–radius: 24px;
–safe-top: env(safe-area-inset-top, 48px);
–safe-bottom: env(safe-area-inset-bottom, 24px);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

#app {
height: 100%;
display: flex;
flex-direction: column;
padding-top: var(–safe-top);
padding-bottom: var(–safe-bottom);
}

/* ── SCREEN SYSTEM ── */
.screen { display: none; flex-direction: column; height: 100%; }
.screen.active { display: flex; }

/* ── STUDY SCREEN ── */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 24px 8px;
flex-shrink: 0;
}

.app-title {
font-family: ‘DM Serif Display’, serif;
font-size: 22px;
color: var(–text);
letter-spacing: -0.3px;
}

.session-pill {
font-size: 12px;
font-weight: 500;
color: var(–muted);
background: var(–surface2);
padding: 5px 12px;
border-radius: 99px;
border: 1px solid var(–border);
}

/* stats row */
.stats-row {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
padding: 8px 24px;
flex-shrink: 0;
}

.stat-box {
background: var(–surface);
border-radius: 16px;
padding: 10px 8px;
text-align: center;
border: 1px solid var(–border);
}

.stat-num {
font-family: ‘DM Serif Display’, serif;
font-size: 24px;
color: var(–text);
line-height: 1;
}

.stat-label {
font-size: 11px;
color: var(–muted);
margin-top: 3px;
letter-spacing: 0.04em;
}

/* progress */
.progress-wrap {
padding: 10px 24px 4px;
flex-shrink: 0;
}

.progress-track {
height: 3px;
background: var(–surface2);
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: var(–green);
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.progress-meta {
display: flex;
justify-content: space-between;
margin-top: 6px;
font-size: 12px;
color: var(–hint);
}

/* goal banner */
.goal-banner {
margin: 4px 24px 0;
background: var(–green-dim);
border: 1px solid rgba(62,207,142,0.25);
border-radius: 12px;
padding: 8px 14px;
font-size: 13px;
color: var(–green);
text-align: center;
display: none;
}
.goal-banner.show { display: block; }

/* card area */
.card-area {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
padding: 12px 20px;
position: relative;
}

.card {
width: 100%;
max-width: 380px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 32px 28px;
position: relative;
cursor: pointer;
transition: transform 0.08s ease;
will-change: transform;
min-height: 260px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.card:active { transform: scale(0.985); }
.card.dragging { transition: none; }

.card-block-tag {
position: absolute;
top: 16px;
left: 20px;
font-size: 10px;
font-weight: 500;
color: var(–hint);
letter-spacing: 0.08em;
text-transform: uppercase;
}

.card-counter {
position: absolute;
top: 16px;
right: 20px;
font-size: 11px;
color: var(–hint);
}

.card-dutch {
font-family: ‘DM Serif Display’, serif;
font-size: 38px;
color: var(–text);
text-align: center;
line-height: 1.15;
letter-spacing: -0.5px;
margin-bottom: 6px;
}

.card-pron {
font-size: 13px;
color: var(–muted);
text-align: center;
font-style: italic;
letter-spacing: 0.02em;
}

.tap-hint {
margin-top: 24px;
font-size: 12px;
color: var(–hint);
display: flex;
align-items: center;
gap: 6px;
}

.tap-hint::before {
content: ‘’;
display: block;
width: 28px;
height: 1px;
background: var(–hint);
}
.tap-hint::after {
content: ‘’;
display: block;
width: 28px;
height: 1px;
background: var(–hint);
}

.card-divider {
width: 40px;
height: 1px;
background: var(–border);
margin: 20px auto;
}

.card-english {
font-size: 22px;
font-weight: 400;
color: var(–text);
text-align: center;
margin-bottom: 4px;
}

.card-turkish {
font-size: 15px;
color: var(–muted);
text-align: center;
margin-bottom: 16px;
}

.card-example {
font-size: 12px;
color: var(–hint);
text-align: center;
line-height: 1.6;
font-style: italic;
max-width: 280px;
}

/* swipe overlays */
.swipe-overlay {
position: absolute;
top: 18px;
padding: 6px 14px;
border-radius: 8px;
font-size: 13px;
font-weight: 500;
opacity: 0;
pointer-events: none;
transition: opacity 0.05s;
}

.overlay-right {
right: 20px;
background: var(–green-dim);
color: var(–green);
border: 1px solid rgba(62,207,142,0.3);
}

.overlay-left {
left: 20px;
background: var(–red-dim);
color: var(–red);
border: 1px solid rgba(255,107,107,0.3);
}

/* swipe guide */
.swipe-guide {
display: flex;
justify-content: space-between;
padding: 0 28px;
flex-shrink: 0;
margin-bottom: 8px;
}

.guide-item {
display: flex;
align-items: center;
gap: 6px;
font-size: 12px;
color: var(–hint);
}

.guide-dot {
width: 6px;
height: 6px;
border-radius: 50%;
}

.guide-dot.red { background: var(–red); opacity: 0.5; }
.guide-dot.green { background: var(–green); opacity: 0.5; }

/* buttons */
.btn-row {
display: flex;
gap: 12px;
padding: 0 24px 16px;
flex-shrink: 0;
}

.btn {
flex: 1;
padding: 15px;
border-radius: 16px;
border: 1px solid var(–border);
background: var(–surface);
font-size: 15px;
font-weight: 500;
cursor: pointer;
color: var(–text);
transition: all 0.15s ease;
font-family: ‘DM Sans’, sans-serif;
}

.btn:active { transform: scale(0.96); }

.btn-wrong {
border-color: rgba(255,107,107,0.3);
color: var(–red);
background: var(–red-dim);
}

.btn-right {
border-color: rgba(62,207,142,0.3);
color: var(–green);
background: var(–green-dim);
}

/* ── DONE SCREEN ── */
#screen-done {
align-items: center;
justify-content: center;
padding: 40px 28px;
text-align: center;
}

.done-emoji {
font-size: 64px;
margin-bottom: 20px;
animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes pop {
from { transform: scale(0.5); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}

.done-title {
font-family: ‘DM Serif Display’, serif;
font-size: 32px;
margin-bottom: 8px;
color: var(–text);
}

.done-sub {
font-size: 15px;
color: var(–muted);
margin-bottom: 32px;
line-height: 1.6;
}

.done-stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
width: 100%;
margin-bottom: 36px;
}

.done-stat {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 18px;
padding: 16px 8px;
}

.done-stat-num {
font-family: ‘DM Serif Display’, serif;
font-size: 28px;
color: var(–text);
}

.done-stat-label {
font-size: 11px;
color: var(–muted);
margin-top: 4px;
}

.btn-done {
width: 100%;
padding: 16px;
border-radius: 18px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text);
font-size: 16px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
margin-bottom: 10px;
transition: all 0.15s;
}

.btn-done:active { transform: scale(0.97); }
.btn-done.primary { background: var(–green-dim); border-color: rgba(62,207,142,0.3); color: var(–green); }
</style>

</head>

const DAILY_GOAL = 10;
const SK = 'nl_fc_v3';

let state = {
  queue: [], known: [], learning: [],
  todayDone: 0, todayKnown: 0, todayLearn: 0,
  lastDate: '', currentIdx: 0, showAnswer: false, dayCount: 1
};

function today() { return new Date().toISOString().slice(0,10); }
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function save() { try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){} }
function load() { try{const d=localStorage.getItem(SK);if(d)state={...state,...JSON.parse(d)};}catch(e){} }

function buildQueue() {
  const t = today();
  if (state.lastDate !== t) {
    if (state.lastDate) state.dayCount = (state.dayCount||1)+1;
    state.todayDone=0; state.todayKnown=0; state.todayLearn=0;
    state.lastDate=t;
  }
  const knownSet = new Set(state.known||[]);
  const learningSet = new Set(state.learning||[]);
  let lw = WORDS.filter(w=>learningSet.has(w.dutch));
  let nw = WORDS.filter(w=>!knownSet.has(w.dutch)&&!learningSet.has(w.dutch));
  shuffle(lw); shuffle(nw);
  state.queue = [...lw,...nw];
  if (!state.queue.length) state.queue = shuffle([...WORDS]);
  state.currentIdx=0; state.showAnswer=false;
}

function currentWord() { return state.queue[state.currentIdx % state.queue.length]; }

function render() {
  const w = currentWord();
  if (!w) return;
  document.getElementById('card-block').textContent = 'Blok ' + w.block;
  document.getElementById('card-counter').textContent = (state.currentIdx+1) + ' / ' + state.queue.length;
  document.getElementById('card-dutch').textContent = w.dutch;
  document.getElementById('card-pron').textContent = w.pron;
  document.getElementById('card-english').textContent = w.english;
  document.getElementById('card-turkish').textContent = w.turkish;
  document.getElementById('card-example').textContent = w.example;
  const ans = document.getElementById('card-answer');
  const hint = document.getElementById('tap-hint-el');
  ans.style.display = state.showAnswer ? 'block' : 'none';
  hint.style.display = state.showAnswer ? 'none' : 'flex';
  const done = state.todayDone;
  const pct = Math.min(100, Math.round(done/DAILY_GOAL*100));
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-label').textContent = done+' / '+DAILY_GOAL+' hedef';
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-known').textContent = state.todayKnown;
  document.getElementById('stat-learn').textContent = state.todayLearn;
  document.getElementById('session-tag').textContent = 'Gün '+(state.dayCount||1);
  const banner = document.getElementById('goal-banner');
  banner.classList.toggle('show', done>=DAILY_GOAL);
}

function swipe(dir) {
  if (!state.showAnswer) { state.showAnswer=true; render(); return; }
  const w = currentWord();
  state.todayDone++;
  if (dir==='right') {
    state.todayKnown++;
    if (!state.known.includes(w.dutch)) state.known.push(w.dutch);
    state.learning = state.learning.filter(d=>d!==w.dutch);
  } else {
    state.todayLearn++;
    if (!state.learning.includes(w.dutch)) state.learning.push(w.dutch);
  }
  save();
  if (state.todayDone>=DAILY_GOAL && state.todayDone%DAILY_GOAL===0) { showDone(); return; }
  state.currentIdx++;
  if (state.currentIdx>=state.queue.length) buildQueue();
  state.showAnswer=false;
  render();
}

function showDone() {
  document.getElementById('done-total').textContent = state.todayDone;
  document.getElementById('done-known').textContent = state.todayKnown;
  document.getElementById('done-learn').textContent = state.todayLearn;
  document.getElementById('done-sub').textContent = 'Bugün '+state.todayDone+' kelime tamamladın. Harika!';
  document.getElementById('screen-study').classList.remove('active');
  document.getElementById('screen-done').classList.add('active');
}

function continueStudy() {
  document.getElementById('screen-done').classList.remove('active');
  document.getElementById('screen-study').classList.add('active');
  state.currentIdx++; if(state.currentIdx>=state.queue.length) buildQueue();
  state.showAnswer=false; render();
}

function resetDay() {
  state.todayDone=0; state.todayKnown=0; state.todayLearn=0;
  buildQueue(); save(); continueStudy();
}

// Touch/swipe
const card = document.getElementById('flashcard');
let startX=0, isDrag=false, curX=0;

card.addEventListener('touchstart', e=>{
  startX=e.touches[0].clientX; isDrag=true; card.classList.add('dragging');
},{passive:true});

card.addEventListener('touchmove', e=>{
  if(!isDrag) return;
  curX=e.touches[0].clientX-startX;
  card.style.transform='translateX('+curX+'px) rotate('+(curX*0.03)+'deg)';
  const ovR=document.getElementById('overlay-right');
  const ovL=document.getElementById('overlay-left');
  if(curX>30){ovR.style.opacity=Math.min(1,(curX-30)/60);ovL.style.opacity=0;}
  else if(curX<-30){ovL.style.opacity=Math.min(1,(-curX-30)/60);ovR.style.opacity=0;}
  else{ovR.style.opacity=0;ovL.style.opacity=0;}
},{passive:true});

card.addEventListener('touchend', ()=>{
  isDrag=false; card.classList.remove('dragging');
  card.style.transform='';
  document.getElementById('overlay-right').style.opacity=0;
  document.getElementById('overlay-left').style.opacity=0;
  if(Math.abs(curX)>80) swipe(curX>0?'right':'left');
  else if(Math.abs(curX)<10 && !state.showAnswer){state.showAnswer=true;render();}
  curX=0;
});

card.addEventListener('click',()=>{
  if(!state.showAnswer){state.showAnswer=true;render();}
});

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

load(); buildQueue(); render();
</script>
